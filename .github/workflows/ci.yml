name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install linting/formatting tools
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      # Run linting checks
      - name: Ruff lint
        run: ruff check src tools

      # Run formatting checks (does not modify files)
      - name: Ruff format check
        run: ruff format --check src tools

  test:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install coverage tool
      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage pytest pytest-cov

      # Run data gatekeeper using MVP sample data
      - name: Validate sample players data
        run: |
          python -m coverage run --source=src,tools tools/check_players.py \
            --players data/sample_players.json \
            --report data/sample_validation_report.txt

      # Run scheduling engine using MVP sample data
      - name: Run scheduler with sample data
        run: |
          python -m coverage run --append --source=src,tools src/cli.py \
            --players data/sample_players.json \
            --ms data/matches/sample_men_singles.json \
            --ws data/matches/sample_women_singles.json \
            --md data/matches/sample_men_doubles.json \
            --wd data/matches/sample_women_doubles.json \
            --xd data/matches/sample_mixed_doubles.json \
            --courts 5 \
            --w1 10.0 \
            --w2 7.0 \
            --w3 2.5 \
            --beam-width 10

      # Run unit tests with coverage
      - name: Run pytest with coverage
        run: |
          pytest -q \
            --cov=src --cov=tools \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-append \
            --cov-fail-under=80

      # Write a Markdown coverage summary to the workflow UI
      - name: Coverage summary (Markdown)
        if: always()
        run: |
          python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      # Generate HTML coverage report for artifacts
      - name: Generate coverage HTML
        if: always()
        run: |
          python -m coverage html

      # Upload coverage HTML report as artifact (always run)
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
